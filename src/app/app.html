<!-- THE COVER (Welcome Screen) -->
<section id="welcome-screen" [class.is-hidden]="isDismissed">
  <!-- Use the signal from the service -->
<img [src]="themeService.isDarkMode() ? 'assets/Logo/JC white (2).png' : 'assets/Logo/jc black.png'" alt="">

  <div class="hero-text">
    <h1 class="left-1st">Design</h1>
    <h1 class="right-1st">Develop</h1>
    <h1 class="left-2nd">Create</h1>
    <h1 class="right-2nd">JC Bernabe</h1>
  </div>
  
  <a (click)="dismissWelcome()" class="see-more">
    <span>See more</span>
    <div class="chevron"></div>
  </a>
  <p>Since 2026</p>
</section>

<!-- THE ACTUAL WEBSITE (Revealed when cover slides up) -->
<main id="home-page">
  <router-outlet></router-outlet>
</main>
